# API - Backend REST API
# Connects to Redis and serves team data

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: the-hole
  labels:
    app: api
    tier: backend
spec:
  replicas: 2  # Run 2 instances for high availability
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        tier: backend
    spec:

      containers:
      - name: api
        image: danielwchas/dice-app:v7
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http

        # Load configuration from ConfigMap
        envFrom:
        - configMapRef:
            name: api-config
        - secretRef:
            name: api-secrets

        resources:
          requests:
            cpu: "10m"
            memory: "128Mi"
          limits:
            cpu: "20m"
            memory: "256Mi"

        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
# API Service - Makes API accessible to other pods
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: the-hole
  labels:
    app: api
spec:
  type: ClusterIP  # Internal only
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
    # nodePort: 32000
  selector:
    app: api
